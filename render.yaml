services:
  - type: web
    name: pl-kanban
    runtime: python
    plan: free
    buildCommand: |
      python -V
      pip install --no-cache-dir -r requirements.txt
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT --workers=1 --timeout=60"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: KANBAN_DB_PATH
        value: "/tmp/kanban.db"
      - key: HERMES_KANBAN_BOARD
        value: "/tmp"
      - key: DISABLE_HERMES_CLI
        value: "1"
# Render free tier does NOT support persistent disks.
# DB is therefore ephemeral at /tmp/kanban.db and resets on each deploy/spindown.
# If you need persistence, upgrade to Starter and add a disk mount at /data.
