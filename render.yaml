services:
  - type: web
    name: pl-kanban
    runtime: python
    plan: free
    buildCommand: |
      python -V
      pip install --no-cache-dir -r requirements.txt
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT --workers=1 --timeout=60"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "10000"
      - key: KANBAN_DB_PATH
        value: "/data/kanban.db"
      - key: HERMES_KANBAN_BOARD
        value: "/data"
    disk:
      name: pl-kanban-data
      mountPath: /data
      sizeGB: 1
# Way 2 SQLite-backed deployment
# - Uses direct SQLite access; never depends on `hermes` CLI at runtime.
# - Upload a populated local DB with `render-cli assets --assetPath "C:\Users\PROJECT-1\AppData\Local\hermes\kanban\kanban.db"`.
# - Or rely on Hermes local writes/updates during the next sync window and bootstrapped rows after first deploy.
