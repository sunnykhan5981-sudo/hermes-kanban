services:
  - type: web
    name: hermes-kanban
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      pip install hermes-agent
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: HERMES_CMD
        value: "hermes"
      - key: HERMES_KANBAN_BOARD
        value: "/data/hermes-kanban"
      - key: XDG_CONFIG_HOME
        value: "/data/hermes"
      - key: XDG_DATA_HOME
        value: "/data/hermes"
    disk:
      name: kanban-data
      mountPath: /data
      sizeGB: 1# triggered rebuild 19 Jun 2026 19:31:55
