<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Hermes Kanban</title>
<style>
  :root { --bg:#0b0b10; --panel:#14141c; --panel2:#1c1c27; --line:#26262f; --ink:#f1f1f7; --muted:#8a8a99; --accent:#5e5ce6; }
  * { box-sizing: border-box; }
  html,body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
  header { position: sticky; top: 0; z-index: 20; backdrop-filter: blur(20px); background: rgba(11,11,16,.75); border-bottom: 1px solid var(--line); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .brand { font-weight: 700; letter-spacing: .3px; }
  .right { display:flex; gap:10px; align-items:center; }
  .pill { font-size:12px; color: var(--muted); background: var(--panel2); padding: 4px 10px; border-radius: 999px; }
  main { padding: 14px; }
  .board { display: grid; grid-template-columns: repeat(3, minmax(260px, 1fr)); gap: 14px; }
  @media (max-width: 960px) { .board { grid-template-columns: repeat(2, minmax(240px, 1fr)); } }
  @media (max-width: 600px) { .board { grid-template-columns: 1fr; } }
  .col { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 10px; }
  .col-head { display:flex; align-items:center; justify-content: space-between; padding: 6px 6px 10px; }
  .col-title { font-weight: 700; display:flex; gap:8px; align-items:center; }
  .cards { display: flex; flex-direction: column; gap: 10px; min-height: 60px; }
  .card { background: #0f0f16; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; touch-action: pan-y; }
  .card:active { transform: scale(.985); }
  .cid { font-size: 11px; color: var(--muted); }
  .ctitle { font-size: 14px; line-height: 1.35; margin-top: 4px; }
  .meta { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .chip { font-size: 11px; padding: 3px 8px; border-radius: 999px; background: var(--panel2); color: var(--muted); }
  .chip.high { color: #ffd54a; background: rgba(255,179,0,.14); }
  .avatar { width: 22px; height: 22px; border-radius: 50%; display:inline-grid; place-items:center; font-size: 11px; background: var(--panel2); color: var(--ink); }
  .fab { position: fixed; right: 18px; bottom: calc(18px + env(safe-area-inset-bottom)); width: 56px; height: 56px; border-radius: 18px; border: none; color: white; font-size: 28px; background: linear-gradient(180deg,#7c6ff7,#5e5ce6); box-shadow: 0 14px 24px rgba(94,92,230,.45); z-index: 30; }
  .fab:active { transform: scale(.96); }
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: flex-end; justify-content: center; z-index: 40; }
  .backdrop.open { display: flex; }
  .modal { width: 100%; max-width: 520px; background: #16161d; border-top-left-radius: 18px; border-top-right-radius: 18px; border: 1px solid var(--line); padding: 16px; animation: up .22s ease-out; }
  @keyframes up { from { transform: translateY(40px); } to { transform: translateY(0); } }
  .modal h3 { margin: 0 0 10px; }
  fieldset { border: 1px solid var(--line); border-radius: 12px; padding: 10px; margin: 8px 0; }
  legend { padding: 0 6px; color: var(--muted); font-size: 12px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 4px; }
  input,select,textarea { width: 100%; background: #0f0f13; color: var(--ink); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .actions { display: flex; gap: 10px; margin-top: 14px; }
  .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; background: var(--panel2); color: var(--ink); }
  .btn.primary { background: linear-gradient(180deg,#7c6ff7,#5e5ce6); color: white; }
  .btn.danger { background: rgba(255,59,48,.14); color: #ff6b64; }
  .empty { color: var(--muted); font-size: 13px; padding: 8px 6px; }
  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); background: #1c1c24; color: var(--ink); border: 1px solid var(--line); padding: 10px 14px; border-radius: 999px; font-size: 13px; opacity: 0; transition: .2s ease; z-index: 50; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <div class="brand">📋 Hermes Kanban</div>
  <div class="right"><span class="pill" id="status">Connecting...</span></div>
</header>
<main>
  <div class="board" id="board"></div>
</main>
<button class="fab" id="fab" aria-label="Create task">＋</button>
<div class="backdrop" id="backdrop">
  <div class="modal" role="dialog" aria-modal="true">
    <h3>New Task</h3>
    <fieldset><legend>Details</legend><label>Title</label><input id="title" placeholder="What needs to be done?" autocomplete="off"></fieldset>
    <div class="row">
      <fieldset>
        <legend>Assignee</legend>
        <select id="assignee">
          <option value="default">Orchestrator</option>
          <option value="researcher">Researcher</option>
          <option value="coder">Developer</option>
          <option value="reviewer">Reviewer</option>
          <option value="planning">Planning</option>
          <option value="marketing">Marketing</option>
          <option value="support">Support</option>
        </select>
      </fieldset>
      <fieldset>
        <legend>Priority</legend>
        <select id="priority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </fieldset>
    </div>
    <div class="actions">
      <button class="btn danger" id="cancel">Cancel</button>
      <button class="btn primary" id="create">Create</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = '/api';
const COLS = [
  { key: 'todo', title: 'To Do', icon: '📝' },
  { key: 'doing', title: 'In Progress', icon: '⚡' },
  { key: 'done', title: 'Done', icon: '✅' }
];
const state = { tasks: [] };
const $ = id => document.getElementById(id);
function toast(msg, type='ok') {
  const t = $('toast'); t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2200);
  if (navigator.vibrate) navigator.vibrate(type==='error' ? [40,30,40] : [10]);
}
async function api(path, opts={}) {
  const res = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
  return data;
}
function groupByStatus(tasks) {
  const map = {};
  for (const c of COLS) map[c.key] = [];
  for (const t of tasks) {
    const s = String(t.status || 'todo').toLowerCase();
    if (!map[s]) map[s] = [];
    map[s].push(t);
  }
  return map;
}
function renderBoard() {
  const grouped = groupByStatus(state.tasks);
  $('board').innerHTML = COLS.map(col => {
    const items = (grouped[col.key] || []);
    return `<section class="col" data-status="${col.key}">
      <div class="col-head"><div class="col-title">${col.icon} ${col.title}</div><div class="pill">${items.length}</div></div>
      <div class="cards">${items.length===0?'<div class="empty">No tasks</div>':items.map(cardHtml).join('')}</div>
    </section>`;
  }).join('');
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }
function cardHtml(t){
  const prio = t.priority==='high' ? '<span class="chip high">High</span>' : (t.priority ? `<span class="chip">${escapeHtml(t.priority)}</span>` : '');
  const assignee = t.assignee ? `<span class="avatar" title="${escapeHtml(t.assignee)}">${escapeHtml(t.assignee)[0].toUpperCase()}</span>` : '';
  return `<article class="card" data-id="${escapeHtml(t.id)}" draggable="false">
    <div class="cid">#${escapeHtml(t.id)}</div>
    <div class="ctitle">${escapeHtml(t.title)}</div>
    <div class="meta">${prio}${assignee}</div>
  </article>`;
}
async function refresh(){
  try {
    const { tasks } = await api('/tasks');
    state.tasks = tasks; renderBoard(); $('status').textContent = 'Connected';
  } catch (e) { console.error(e); $('status').textContent = 'Disconnected'; }
}
function openModal(){ $('backdrop').classList.add('open'); $('title').focus(); }
function closeModal(){ $('backdrop').classList.remove('open'); $('title').value=''; }
async function createTask(){
  const title = $('title').value.trim();
  if (!title){ toast('Title is required','error'); return; }
  const assignee = $('assignee').value;
  const priority = $('priority').value;
  try {
    await api('/tasks', { method:'POST', body: JSON.stringify({ title, assignee, priority }) });
    toast('Task created'); closeModal(); await refresh();
  } catch (e){ toast(e.message || 'Create failed','error'); }
}
async function moveTask(id, to){
  try { await api('/tasks/'+encodeURIComponent(id)+'/move', { method:'POST', body: JSON.stringify({ status: to }) }); await refresh(); }
  catch (e){ toast(e.message || 'Move failed','error'); }
}
function initSwipe(){
  let startX=0, el=null;
  const onStart = (e) => { const card=e.target.closest('.card'); if (!card) return; el=card; startX = e.touches ? e.touches[0].clientX : e.clientX; };
  const onEnd = (e) => {
    if (!el) return;
    const x = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX) - startX;
    if (Math.abs(x) < 60) return;
    const col = el.closest('.col'); if (!col) return;
    const cols = COLS.map(c=>c.key); const idx = cols.indexOf(col.dataset.status);
    if (x < -40 && idx < cols.length-1) moveTask(el.dataset.id, cols[idx+1]);
    else if (x > 40 && idx > 0) moveTask(el.dataset.id, cols[idx-1]);
    el = null;
  };
  document.addEventListener('touchstart', onStart, {passive:true});
  document.addEventListener('touchend', onEnd);
  document.addEventListener('mousedown', onStart);
  document.addEventListener('mouseup', onEnd);
}
function boot(){
  $('fab').onclick = openModal;
  $('cancel').onclick = closeModal;
  $('create').onclick = createTask;
  $('backdrop').onclick = (e) => { if (e.target === $('backdrop')) closeModal(); };
  initSwipe(); refresh(); setInterval(refresh, 10000);
}
document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
