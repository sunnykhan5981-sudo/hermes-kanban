<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#07090f" />
<meta name="description" content="Hermes Multi-Agent Kanban Dashboard" />
<title>Hermes Kanban</title>
<link rel="manifest" href="/manifest.json" />
<link rel="stylesheet" href="/static/style.css?v=3" />
</head>
<body>
<header class="app-header">
  <div class="brand">📋 Hermes Kanban</div>
  <div class="header-right">
    <span class="pill" id="statusText">Connecting...</span>
    <span class="pill" id="statsText"></span>
    <button class="icon-btn" id="refreshBtn" title="Refresh">↻</button>
  </div>
</header>
<main>
  <div class="toolbar">
    <input class="form-input" id="searchBox" placeholder="Search tasks..." />
    <select class="form-select" id="assigneeFilter">
      <option value="">All assignees</option>
      <option value="default">Orchestrator</option>
      <option value="researcher">Researcher</option>
      <option value="coder">Developer</option>
      <option value="reviewer">Reviewer</option>
      <option value="planning">Planning</option>
      <option value="marketing">Marketing</option>
      <option value="support">Support</option>
    </select>
    <select class="form-select" id="priorityFilter">
      <option value="">All priorities</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <button class="btn btn-primary" id="createBtn">New Task</button>
  </div>
  <div class="board" id="board"></div>
</main>
<button class="fab" id="fab" aria-label="Create task">＋</button>
<button class="bulkDeleteBtn" id="bulkDeleteBtn" type="button">Delete Selected</button>
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>New Task</h3>
    <fieldset>
      <legend>Details</legend>
      <label>Title</label>
      <input id="cTitle" placeholder="What needs to be done?" />
      <label>Description</label>
      <textarea id="cDesc" rows="3" placeholder="Optional details"></textarea>
    </fieldset>
    <div class="row">
      <fieldset>
        <legend>Assignee</legend>
        <select id="cAssignee">
          <option value="default">Orchestrator</option>
          <option value="researcher">Researcher</option>
          <option value="coder">Developer</option>
          <option value="reviewer">Reviewer</option>
          <option value="planning">Planning</option>
          <option value="marketing">Marketing</option>
          <option value="support">Support</option>
        </select>
      </fieldset>
      <fieldset>
        <legend>Priority</legend>
        <select id="cPriority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </fieldset>
    </div>
    <div class="actions">
      <button class="btn btn-danger" id="cancelCreate">Cancel</button>
      <button class="btn btn-primary" id="submitCreate">Create</button>
    </div>
  </div>
</div>
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title" id="dTitle">Task</div>
    <div class="drawer-meta" id="dMeta">Task · Status · Assignee</div>
    <button class="modal-close icon-btn" id="dClose" type="button">✕</button>
  </div>
  <div class="drawer-body" id="dBody"></div>
  <div class="drawer-actions">
    <button class="btn btn-primary" id="dComplete">Complete</button>
    <button class="btn btn-danger" id="dDelete">Archive</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/static/app.js?v=4"></script>
</body>
</html>
